<!DOCTYPE html>
<html>
    <head>
        <title>Password Task</title>
        <script>
            var click = 0;
            function fnShowHidePassword(){
                var inputDOM = document.querySelector("input");
                var buttonDOM = document.querySelector("button");

                click++;
                if(click % 2 == 1){
                    inputDOM.type = "text";
                    buttonDOM.textContent = "Hide Password";
                    
                }else{
                    inputDOM.type = "password";
                    buttonDOM.textContent = "Show Password";
                }
               
            }
            
        </script>
    </head>
    <body>
        <h1>Show / Hide Password</h1>
        <input type="password" name="" id="pwdId" placeholder="enter password">
        <button onclick="fnShowHidePassword()">Show Password</button>
    </body>
</html>
